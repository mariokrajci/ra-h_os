name: Deploy RA-H OS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          ping: ${{ secrets.SERVER_HOST }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/rah_key
          chmod 600 ~/.ssh/rah_key
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/rah_key "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" << 'EOF2'
            set -e
            cd /home/mario/srv/apps/ra-h_os
            git pull origin main
            export PATH=/home/mario/.nvm/versions/node/v20.20.0/bin:$PATH
            /home/mario/.nvm/versions/node/v20.20.0/bin/node /home/mario/.nvm/versions/node/v20.20.0/lib/node_modules/npm/bin/npm-cli.js install
            /home/mario/.nvm/versions/node/v20.20.0/bin/node /home/mario/.nvm/versions/node/v20.20.0/lib/node_modules/npm/bin/npm-cli.js run build
            sudo -n systemctl restart rah
          EOF2
